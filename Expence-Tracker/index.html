<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .expense-item:last-child {
            border-bottom: none;
        }
        .expense-item button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
     </style>
</head>
<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow">
                    <div class="card-body">

                        <h1 class="text-center mb-4">💰 Expense Tracker</h1>

                        <form id="expenseForm" onsubmit="handleAddExpense(event)">

                            <div class="mb-3">
                                <label for="expenseInput" class="form-label">
                                    Expense Amount
                                </label>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="expenseInput"
                                    placeholder="Enter amount"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="descriptionInput" class="form-label">
                                    Description
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="descriptionInput"
                                    placeholder="Enter description"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="categorySelect" class="form-label">
                                    Category
                                </label>

                                <select
                                    class="form-select"
                                    id="categorySelect"
                                >
                                    <option value="Food">Food</option>
                                    <option value="Transportation">Transportation</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Utilities">Utilities</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <button
                                type="submit"
                                id="addExpenseButton"
                                class="btn btn-primary w-100"
                            >
                                Add Expense
                            </button>

                        </form>

                    </div>
                </div>

                <!-- Total Expense -->
                <div class="card shadow mt-4">
                    <div class="card-body text-center">
                        <h4>
                            Total Expense:
                            ₹<span id="totalExpense">0</span>
                        </h4>
                    </div>
                </div>

                <!-- Expense List -->
                <div class="card shadow mt-4">
                    <div class="card-body">

                        <h3 class="mb-3">Expense History</h3>

                        <ul
                            id="expenseList"
                            class="list-group"
                        >
                        </ul>

                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
